services:
  ozon-tracker-proxy:
    build: .
    # Or use a prebuilt image if you publish one:
    # image: ghcr.io/braindelook/ozon-tracker-proxy:latest
    container_name: ozon-tracker-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Optional overrides:
      # - OZON_APP_VERSION=release/TPLAPI-5269
      # - OZON_NAV_TIMEOUT_MS=60000
      - LOG_LEVEL=INFO
    # Chromium needs a bit of RAM; give it some shared memory.
    shm_size: "512m"
